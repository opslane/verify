<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reports</title>
    <link rel="stylesheet" href="/shared.css" />
    <style>
      .reports-shell {
        display: grid;
        gap: 18px;
        padding: 32px;
      }

      .report-table {
        display: grid;
        gap: 12px;
      }

      .report-card {
        padding: 16px 18px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.03);
        border: 1px solid rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="surface reports-shell" aria-label="Reports">
        <p class="muted">Reports</p>
        <div id="reports-state" aria-live="polite">
          <p class="muted">Loading reports...</p>
        </div>
        <div id="reports-results" class="report-table" hidden></div>
      </section>
    </main>
    <script src="/shared.js"></script>
    <script>
      (function () {
        const state = document.getElementById("reports-state");
        const results = document.getElementById("reports-results");

        window.setTimeout(() => {
          state.innerHTML = "<p class=\"muted\">Reports loaded</p>";
          results.hidden = false;
          results.innerHTML = [
            "<article class=\"report-card\"><h2>Monthly revenue</h2><p>$124,800</p></article>",
            "<article class=\"report-card\"><h2>Active users</h2><p>18,402</p></article>",
          ].join("");
        }, 4500);
      })();
    </script>
  </body>
</html>
