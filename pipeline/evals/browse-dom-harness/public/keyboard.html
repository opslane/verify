<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings</title>
    <link rel="stylesheet" href="/shared.css" />
    <style>
      .settings-shell {
        display: grid;
        gap: 20px;
        padding: 32px;
      }

      .tablist {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(15, 23, 42, 0.08);
        color: #0f172a;
        font-weight: 600;
      }

      .tabpanel {
        border-radius: 18px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(99, 102, 241, 0.16);
      }

      .tabpanel[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="surface settings-shell" aria-label="Settings">
        <div class="stack">
          <p class="muted">Keyboard navigation</p>
          <h1>Settings</h1>
          <p id="selected-section" class="status-chip" aria-live="polite">Selected section: Profile</p>
          <div class="tablist" role="tablist" aria-label="Settings sections">
            <button id="profile-tab" class="button button-primary" type="button" role="tab" aria-selected="true" aria-controls="profile-panel" autofocus>Profile</button>
            <button id="security-tab" class="button" type="button" role="tab" aria-selected="false" aria-controls="security-panel" tabindex="-1">Security</button>
            <button id="notifications-tab" class="button" type="button" role="tab" aria-selected="false" aria-controls="notifications-panel" tabindex="-1">Notifications</button>
          </div>
        </div>

        <section id="profile-panel" class="tabpanel" role="tabpanel" tabindex="0" aria-labelledby="profile-tab">
          <h2>Profile</h2>
          <p class="muted">Name, avatar, and public profile details.</p>
        </section>

        <section id="security-panel" class="tabpanel" role="tabpanel" tabindex="0" aria-labelledby="security-tab" hidden>
          <h2>Security</h2>
          <p class="muted">Password, sessions, and two-factor auth.</p>
        </section>

        <section id="notifications-panel" class="tabpanel" role="tabpanel" tabindex="0" aria-labelledby="notifications-tab" hidden>
          <h2>Notifications</h2>
          <p class="muted">Email digests, alerts, and mention preferences.</p>
        </section>
      </section>
    </main>
    <script src="/shared.js"></script>
    <script>
      (function () {
        const tabs = [
          document.getElementById("profile-tab"),
          document.getElementById("security-tab"),
          document.getElementById("notifications-tab"),
        ];
        const panels = new Map([
          ["profile-tab", document.getElementById("profile-panel")],
          ["security-tab", document.getElementById("security-panel")],
          ["notifications-tab", document.getElementById("notifications-panel")],
        ]);
        const selectedSection = document.getElementById("selected-section");

        function activateTab(tabId, shouldFocus = false) {
          tabs.forEach((tab) => {
            const isActive = tab.id === tabId;
            tab.setAttribute("aria-selected", String(isActive));
            tab.tabIndex = isActive ? 0 : -1;
            tab.classList.toggle("button-primary", isActive);
            const panel = panels.get(tab.id);
            if (panel) {
              panel.hidden = !isActive;
            }
          });

          if (selectedSection) {
            const nextTab = document.getElementById(tabId);
            selectedSection.textContent = `Selected section: ${nextTab?.textContent ?? tabId}`;
          }

          if (shouldFocus) {
            document.getElementById(tabId)?.focus();
          }
        }

        tabs.forEach((tab, index) => {
          tab.addEventListener("click", () => activateTab(tab.id));
          tab.addEventListener("keydown", (event) => {
            if (event.key !== "ArrowRight" && event.key !== "ArrowLeft" && event.key !== "Home" && event.key !== "End") {
              return;
            }

            event.preventDefault();
            let nextIndex = index;
            if (event.key === "ArrowRight") nextIndex = (index + 1) % tabs.length;
            if (event.key === "ArrowLeft") nextIndex = (index - 1 + tabs.length) % tabs.length;
            if (event.key === "Home") nextIndex = 0;
            if (event.key === "End") nextIndex = tabs.length - 1;
            activateTab(tabs[nextIndex].id, true);
          });
        });

        activateTab("profile-tab", true);
      })();
    </script>
  </body>
</html>
