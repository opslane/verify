<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event types</title>
    <link rel="stylesheet" href="/shared.css" />
    <style>
      .event-types-shell {
        position: relative;
        display: grid;
        gap: 16px;
        justify-items: start;
        padding: 32px;
      }

      .menu-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="surface event-types-shell" aria-label="Event types">
        <p class="muted">Event types</p>
        <button id="more-actions-button" class="button button-primary" type="button" aria-haspopup="dialog" aria-expanded="false">More</button>
        <div id="dialog-layer"></div>
      </section>
    </main>
    <script src="/shared.js"></script>
    <script>
      (function () {
        const trigger = document.getElementById("more-actions-button");
        const layer = document.getElementById("dialog-layer");
        const menuLabel = ["Event", "type", "actions"].join(" ");
        const duplicateHeading = ["Duplicate", "event", "type"].join(" ");
        let currentDialog = null;

        function removeCurrentDialog() {
          if (!currentDialog) {
            return;
          }

          currentDialog.close();
          currentDialog.remove();
          currentDialog = null;
          trigger.setAttribute("aria-expanded", "false");
        }

        function mountDialog(dialog) {
          layer.appendChild(dialog);
          currentDialog = dialog;
          trigger.setAttribute("aria-expanded", "true");
          dialog.showModal();
        }

        function createDialog(content) {
          const dialog = document.createElement("dialog");
          dialog.className = "dialog";
          dialog.innerHTML = content;
          dialog.addEventListener("cancel", (event) => {
            event.preventDefault();
            removeCurrentDialog();
          });
          dialog.addEventListener("close", () => {
            if (currentDialog === dialog) {
              currentDialog = null;
              trigger.setAttribute("aria-expanded", "false");
            }
            dialog.remove();
          });
          return dialog;
        }

        function openDuplicateDialog() {
          removeCurrentDialog();

          const dialog = createDialog(`
            <div class="stack">
              <h2 id="duplicate-event-type-heading">${duplicateHeading}</h2>
              <p class="muted">Create a copy before editing.</p>
              <div class="menu-actions">
                <button class="button" id="cancel-duplicate-button" type="button">Cancel</button>
                <button class="button button-primary" id="confirm-duplicate-button" type="button">Confirm</button>
              </div>
            </div>
          `);

          dialog.setAttribute("aria-labelledby", "duplicate-event-type-heading");
          mountDialog(dialog);

          dialog.querySelector("#cancel-duplicate-button")?.addEventListener("click", removeCurrentDialog);
          dialog.querySelector("#confirm-duplicate-button")?.addEventListener("click", removeCurrentDialog);
        }

        function openMenuDialog() {
          removeCurrentDialog();

          const dialog = createDialog(`
            <div class="stack">
              <p class="muted">${menuLabel}</p>
              <div class="menu-actions">
                <button class="button" id="cancel-action-button" type="button">Cancel</button>
                <button class="button button-primary" id="duplicate-action-button" type="button">Duplicate</button>
              </div>
            </div>
          `);

          dialog.setAttribute("aria-label", menuLabel);
          mountDialog(dialog);

          dialog.querySelector("#cancel-action-button")?.addEventListener("click", removeCurrentDialog);
          dialog.querySelector("#duplicate-action-button")?.addEventListener("click", openDuplicateDialog);
        }

        trigger.addEventListener("click", openMenuDialog);
      })();
    </script>
  </body>
</html>
